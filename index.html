<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Viewer</title>
    <style>
        :root {
            --color-primary: #208090;
            --color-primary-hover: #1a6975;
            --color-bg: #fcfcf9;
            --color-surface: #ffffff;
            --color-text: #134252;
            --color-border: rgba(94, 82, 64, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.04), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            --color-secondary: #666666;
            --color-secondary-hover: #555555;
            --color-secondary-active: #444444;
        }

        * {
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.5;
            color: var(--color-text);
            background-color: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .card {
            background-color: var(--color-surface);
            border-radius: 12px;
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-md);
            padding: 40px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .question-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            background-color: #f5f5f5;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--color-border);
        }

        .question-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .answer-container {
            font-size: 24px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 250ms cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            text-decoration: none;
        }

        .btn:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        .btn--primary {
            background: var(--color-primary);
            color: #fcfcf9;
            flex: 1;
        }

        .btn--primary:hover {
            background: var(--color-primary-hover);
        }

        .btn--primary:active {
            opacity: 0.9;
        }

        .header {
            text-align: center;
            margin-bottom: 8px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--color-text);
        }

        .counter {
            font-size: 14px;
            color: rgba(19, 66, 82, 0.7);
            margin-top: 4px;
        }

        .placeholder {
            color: rgba(19, 66, 82, 0.5);
            font-size: 14px;
            text-align: center;
        }

        @media (max-width: 640px) {
            .card {
                padding: 24px 20px;
            }

            .question-container {
                min-height: 250px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Question Viewer</h1>
                <div class="counter" id="counter">No question loaded</div>
            </div>

            <div class="question-container">
                <img id="questionImage" class="question-image" alt="Question" style="display: none;">
                <div class="placeholder" id="placeholder">Click "New Question" to start</div>
            </div>

            <div class="answer-container" id="answerContainer" style="display: none;">
                <div class="answer-text" id="answerText"></div>
            </div>

            <div class="button-group">
                <button class="btn btn--secondary" id="revealAnswerBtn">Reveal Answer</button>
                <button class="btn btn--primary" id="newQuestionBtn">New Question</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
